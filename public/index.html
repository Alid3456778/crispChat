<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b1220" />
  <title>CrispChat — Customer Support</title>
  <meta
    name="description"
    content="Instant customer support chat powered by Crisp. Get help fast with a clean, full-screen chat experience."
  />
  <meta name="robots" content="index,follow" />
  <meta property="og:title" content="CrispChat — Customer Support" />
  <meta
    property="og:description"
    content="Instant customer support chat powered by Crisp. Get help fast with a clean, full-screen chat experience."
  />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://client.crisp.chat" crossorigin />
  <link rel="dns-prefetch" href="//client.crisp.chat" />

<style>
  :root {
    --bg0: #060a12;
    --bg1: #0b1220;
    --bg2: #0f1b33;
    --text: rgba(255, 255, 255, 0.92);
    --muted: rgba(255, 255, 255, 0.72);
    --line: rgba(255, 255, 255, 0.10);
    --accent0: #7c3aed;
    --accent1: #22d3ee;
    --header-h: 64px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    overflow: hidden;
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    background:
      radial-gradient(900px 600px at 20% 0%, rgba(124, 58, 237, 0.28), transparent 55%),
      radial-gradient(800px 550px at 85% 25%, rgba(34, 211, 238, 0.18), transparent 60%),
      radial-gradient(900px 700px at 50% 120%, rgba(2, 132, 199, 0.12), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1) 45%, var(--bg2));
  }

  .app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: rgba(6, 10, 18, 0.55);
    backdrop-filter: blur(10px);
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    user-select: none;
  }

  .brand img {
    width: 32px;
    height: 32px;
    filter: drop-shadow(0 10px 24px rgba(0,0,0,0.35));
  }

  .brand .name {
    font-size: 14px;
    font-weight: 650;
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .brand .tag {
    margin-left: 10px;
    padding: 6px 10px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    font-size: 12px;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.06);
    white-space: nowrap;
  }

  /* Reserved for future header actions */

  main {
    position: relative;
    flex: 1;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 18px;
  }

  .loading-card {
    width: min(560px, 92vw);
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(15, 23, 42, 0.25);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }

  .loading-top {
    padding: 18px 18px 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .spinner {
    width: 38px;
    height: 38px;
    border-radius: 999px;
    background:
      conic-gradient(from 180deg, rgba(255,255,255,0.0), rgba(255,255,255,0.12), rgba(255,255,255,0.0)),
      conic-gradient(from 0deg, var(--accent0), var(--accent1), var(--accent0));
    -webkit-mask: radial-gradient(circle at 50% 50%, transparent 56%, #000 58%);
    mask: radial-gradient(circle at 50% 50%, transparent 56%, #000 58%);
    animation: spin 1000ms linear infinite;
    flex: 0 0 auto;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text h2 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  .loading-text p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.35;
  }

  .dots::after {
    content: "…";
    display: inline-block;
    width: 1.3em;
    text-align: left;
    animation: dots 1200ms steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ""; }
    25% { content: "."; }
    50% { content: ".."; }
    75% { content: "..."; }
    100% { content: ""; }
  }

  .loading-bar {
    height: 6px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  .loading-bar > div {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, var(--accent0), var(--accent1));
    animation: bar 1100ms ease-in-out infinite;
    border-radius: 999px;
  }

  @keyframes bar {
    0% { transform: translateX(-60%); opacity: 0.55; }
    50% { transform: translateX(80%); opacity: 0.95; }
    100% { transform: translateX(220%); opacity: 0.55; }
  }

  body.is-ready .loading {
    opacity: 0;
    pointer-events: none;
    transition: opacity 260ms ease;
  }

  @media (prefers-reduced-motion: reduce) {
    .spinner, .loading-bar > div { animation: none; }
    .dots::after { animation: none; content: "..."; }
  }

  @media (max-width: 420px) {
    .brand .tag { display: none; }
  }

  /* Fullscreen Crisp */
  .crisp-client .cc-kv6t {
    width: 100% !important;
    height: calc(100% - var(--header-h)) !important;
    bottom: 0 !important;
    right: 0 !important;
    border-radius: 0 !important;
    top: var(--header-h) !important;
  }

  /* Hide small icon */
  .crisp-client .cc-1brb6 {
    display: none !important;
  }
</style>
</head>

<body>

  <div class="app">
    <header>
      <div class="brand" aria-label="CrispChat">
        <img src="/logo.svg" alt="CrispChat logo" width="32" height="32" />
        <div class="name">CrispChat</div>
        <div class="tag">Support</div>
      </div>
      <div aria-hidden="true"></div>
    </header>

    <main>
      <!-- Email Gate: shown only on first visit -->
<div id="email-gate" style="display:none; position:absolute; inset:0; z-index:10; background:rgba(6,10,18,0.85); backdrop-filter:blur(8px); align-items:center; justify-content:center;">
  <div style="width:min(420px,92vw); background:rgba(15,23,42,0.9); border:1px solid rgba(255,255,255,0.12); border-radius:18px; padding:32px; box-shadow:0 24px 80px rgba(0,0,0,0.6);">
    <h2 style="margin:0 0 6px; font-size:20px; font-weight:700;">Start chatting</h2>
    <p style="margin:0 0 24px; font-size:13px; color:rgba(255,255,255,0.6);">Enter your details so we can load your chat history next time.</p>

    <form id="email-form">
      <label style="display:block; font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:6px; letter-spacing:0.5px; text-transform:uppercase;">Name (optional)</label>
      <input id="name-input" type="text" placeholder="Your name" style="width:100%; padding:10px 14px; margin-bottom:14px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:#fff; font-size:14px; outline:none;" />

      <label style="display:block; font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:6px; letter-spacing:0.5px; text-transform:uppercase;">Email address *</label>
      <input id="email-input" type="email" placeholder="you@example.com" required style="width:100%; padding:10px 14px; margin-bottom:20px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:#fff; font-size:14px; outline:none;" />

      <button type="submit" style="width:100%; padding:12px; background:linear-gradient(135deg,#7c3aed,#22d3ee); border:none; border-radius:10px; color:#fff; font-size:14px; font-weight:700; cursor:pointer;">Open Chat →</button>
    </form>
  </div>
</div>
      <div class="loading" role="status" aria-live="polite">
        <div class="loading-card">
          <div class="loading-top">
            <div class="spinner" aria-hidden="true"></div>
            <div class="loading-text">
              <h2>Opening chat<span class="dots" aria-hidden="true"></span></h2>
              <p>Connecting you to our support team. This usually takes a moment.</p>
            </div>
          </div>
          <div class="loading-bar" aria-hidden="true"><div></div></div>
        </div>
      </div>
    </main>
  </div>

  <script>
  window.$crisp = [];
  window.CRISP_WEBSITE_ID = "68987257-808e-403d-a06c-35b3ec18c3ef";
  
  // 1. Try to load saved email from localStorage
  const savedEmail = localStorage.getItem("crisp_user_email");
  const savedName  = localStorage.getItem("crisp_user_name");
  
  function initCrisp(email, name) {
  // Fetch signed token from your server
  fetch(`/auth?email=${encodeURIComponent(email)}`)
    .then(r => r.json())
    .then(data => {
      window.$crisp.push(["set", "user:email",    [data.email, data.token]]);
      window.$crisp.push(["set", "user:nickname", [name || email.split("@")[0]]]);

      var s = document.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      document.head.appendChild(s);
      waitForCrisp(12000);
    });

  
    // 3. Load the Crisp script
    var s = document.createElement("script");
    s.src   = "https://client.crisp.chat/l.js";
    s.async = 1;
    document.head.appendChild(s);
  
    waitForCrisp(12000);
  }
  
  function markReady() {
    if (document.body.classList.contains("is-ready")) return;
    document.body.classList.add("is-ready");
  }
  
  function openChat() {
    window.$crisp.push(["do", "chat:show"]);
    window.$crisp.push(["do", "chat:open"]);
  }
  
  function waitForCrisp(maxWaitMs) {
    var start = Date.now();
    var timer = setInterval(function () {
      if (document.querySelector(".crisp-client")) {
        clearInterval(timer);
        markReady();
        openChat();
        return;
      }
      if (Date.now() - start > maxWaitMs) {
        clearInterval(timer);
        markReady();
      }
    }, 120);
  }
  
  // 4. If email already saved → load Crisp immediately with identity
  if (savedEmail) {
    setTimeout(function () { initCrisp(savedEmail, savedName); }, 300);
  
  // 5. If no saved email → show a custom email form first
  } else {
    document.getElementById("email-gate").style.display = "flex";
    document.getElementById("email-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("email-input").value.trim();
      const name  = document.getElementById("name-input").value.trim();
      if (!email) return;
  
      // Save to localStorage for next visit
      localStorage.setItem("crisp_user_email", email);
      localStorage.setItem("crisp_user_name",  name);
  
      document.getElementById("email-gate").style.display = "none";
      initCrisp(email, name);
    });
  }
  
  // Keep chat open
  setInterval(openChat, 7000);

</script>
</body>
</html>
