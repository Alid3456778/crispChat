      animation:pulse 2s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.45}
    }

    .user-pill{
      display:none;
      align-items:center;
      gap:7px;
      padding:5px 12px;
      border:1px solid rgba(255,255,255,0.11);
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      background:rgba(255,255,255,0.06);
    }

    .user-pill.visible{display:flex}

    .user-pill button{
      background:none;
      border:none;
      cursor:pointer;
      color:rgba(255,255,255,0.28);
      font-size:14px;
      padding:0 0 0 3px;
      transition:color 150ms;
      line-height:1;
    }

    .user-pill button:hover{color:rgba(255,255,255,0.7)}

      position:relative;
      display:flex;
      flex-direction:column;

    }

      position:absolute;
      inset:0;
      z-index:30;
      background:rgba(6,10,18,0.92);
      backdrop-filter:blur(14px);
      align-items:center;
      justify-content:center;
    }

    #email-gate.show{display:flex}

    .gate-card{
      width:min(420px,92vw);
      background:rgba(11,18,32,0.97);
      border:1px solid rgba(255,255,255,0.11);
      border-radius:22px;
      padding:38px 32px;
      box-shadow:0 28px 90px rgba(0,0,0,0.7);
    }

    .gate-icon{
      width:48px;
      height:48px;
      border-radius:14px;

      align-items:center;
      justify-content:center;

      font-weight:700;
      margin-bottom:6px;

    .gate-card p{
      font-size:13px;
      color:var(--muted);
      margin-bottom:28px;
      line-height:1.55;
    }

    .field-label{
      display:block;
      font-size:11px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.6px;
      color:rgba(255,255,255,0.35);
      margin-bottom:7px;
    }

    .field-input{
      width:100%;
      padding:11px 15px;
      margin-bottom:15px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:12px;
      color:#fff;
      font-size:14px;
      outline:none;
      transition:border-color 160ms;
    }

    .field-input:focus{border-color:rgba(124,58,237,0.8)}
    .field-input::placeholder{color:rgba(255,255,255,0.2)}

    .btn-primary{
      width:100%;
      padding:13px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent0),var(--accent1));
      color:#fff;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:opacity 160ms;
      margin-top:4px;
    }

    .btn-primary:hover{opacity:.85}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}

    #chat-ui{
      display:none;
      flex:1;
      flex-direction:column;
      overflow:hidden;
    }

    #chat-ui.show{display:flex}

    #messages{
      flex:1;
      overflow-y:auto;
      padding:20px 16px;
      display:flex;
      flex-direction:column;
      gap:4px;
      scrollbar-width:thin;
      scrollbar-color:rgba(255,255,255,0.08) transparent;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:11px;
      color:rgba(255,255,255,0.28);
      margin:12px 0 8px;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:rgba(255,255,255,0.07);
    }

    .msg-row{
      display:flex;
      flex-direction:column;
      max-width:72%;
    }

    .msg-row.customer{
      align-self:flex-end;
      align-items:flex-end;
    }

    .msg-row.operator{
      align-self:flex-start;
      align-items:flex-start;
    }

    .msg-sender{
      font-size:11px;
      color:var(--muted);
      margin-bottom:3px;
      padding:0 4px;
    }

    .msg-bubble{
      padding:10px 15px;
      border-radius:18px;
      font-size:14px;
      line-height:1.45;
      word-break:break-word;
      max-width:100%;
    }

    .msg-bubble a{
      color:inherit;
      text-decoration:underline;
      text-underline-offset:2px;
    }

    .msg-bubble img{
      max-width:240px;
      width:100%;
      height:auto;
      border-radius:12px;
      display:block;
      margin-top:8px;
      border:1px solid rgba(255,255,255,0.12);
    }

    .msg-row.customer .msg-bubble{
      background:linear-gradient(135deg,#6d28d9,#5b5ef4);
      color:#fff;
      border-bottom-right-radius:5px;
    }

    .msg-row.operator .msg-bubble{
      background:rgba(255,255,255,0.11);
      color:var(--text);
      border-bottom-left-radius:5px;
    }

    .msg-time{
      font-size:10px;
      color:rgba(255,255,255,0.22);
      margin-top:4px;
      padding:0 4px;
    }

    #typing-row{
      display:none;
      align-self:flex-start;
      align-items:flex-end;
      gap:8px;
      margin-top:4px;
    }

    #typing-row.show{display:flex}

    .typing-bubble{
      padding:10px 16px;
      border-radius:18px;
      border-bottom-left-radius:5px;
      background:rgba(255,255,255,0.1);
      display:flex;
      align-items:center;
      gap:4px;
    }

    .typing-bubble span{
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(255,255,255,0.45);
      animation:bounce 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2){animation-delay:.15s}
    .typing-bubble span:nth-child(3){animation-delay:.30s}

    @keyframes bounce{
      0%,80%,100%{transform:translateY(0)}
      40%{transform:translateY(-5px)}
    }

    .chat-empty{
      flex:1;

      flex-direction:column;

      justify-content:center;
      color:rgba(255,255,255,0.22);
      text-align:center;
      gap:10px;
      padding:32px;

    .chat-empty .empty-icon{
      font-size:36px;
      opacity:.4;

    .chat-empty p{
      font-size:13px;
      line-height:1.6;
    }

    #msg-input:focus{border-color:rgba(124,58,237,0.7)}

    #attach-btn{
      width:42px;

      flex-shrink:0;
      border:none;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent0),var(--accent1));
      color:#fff;
      font-size:17px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity 160ms,transform 100ms;
    }

    #attach-btn{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);

    #send-btn:hover,
    #attach-btn:hover{opacity:.85}
    #send-btn:active,
    #attach-btn:active{transform:scale(.92)}
    #send-btn:disabled{opacity:.35;cursor:not-allowed}

      text-align:center;
      font-size:10px;
      color:rgba(255,255,255,0.18);
      padding:5px 0 6px;
      flex-shrink:0;
    }

          <button id="logout-btn" title="Switch account">✕</button>
        </div>
      </div>
    </header>

    <main>
      <div id="email-gate" role="dialog" aria-modal="true" aria-labelledby="gate-title">
        <div class="gate-card">
          <div class="gate-icon">💬</div>
          <h2 id="gate-title">Login (optional)</h2>
          <p>Add your name/email to load chat history across devices. You can also continue without entering anything.</p>

          <form id="email-form" novalidate>
            <!-- <label class="field-label" for="name-input">Your name (optional)</label>

      <button id="attach-btn" aria-label="Attach file or image" title="Attach file or image">

        </svg>
      </button>

      <button id="send-btn" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>

	        var loginBtn      = document.getElementById("login-btn");
	      var userPill      = document.getElementById("user-pill");
	      var userPillEmail = document.getElementById("user-pill-email");
	      var logoutBtn     = document.getElementById("logout-btn");
	      var typingTimer   = null;

	      function isGuestEmail(email) {
	        return typeof email === "string" && email.indexOf("guest+") === 0 && email.indexOf("@crispchat.local") > -1;
	      }

	      function createGuestEmail() {
	        var uuid = "";
	        try {
	          uuid = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : "";
	        } catch (_) {}
	        if (!uuid) {
	          uuid = String(Date.now()) + "-" + String(Math.random()).slice(2);
	        }
	        return "guest+" + uuid + "@crispchat.local";
	      }

      function createGuestToken() {
        var token = "";
        try {
          token = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : "";
        } catch (_) {}
        if (!token) {
          token = "guest-" + String(Date.now()) + "-" + String(Math.random()).slice(2);
        }
        return token;
      }

      function tokenForEmail(email) {
        if (!email) return createGuestToken();
        return String(email).trim().toLowerCase();
      }

	      function ensureIdentity() {
	        var storedEmail = localStorage.getItem("crisp_user_email") || "";
        var storedToken = localStorage.getItem("crisp_user_token") || "";
	        if (!storedEmail) {
	          storedEmail = createGuestEmail();
	          localStorage.setItem("crisp_user_email", storedEmail);
	        }
        if (!storedToken) {
          storedToken = isGuestEmail(storedEmail) ? createGuestToken() : tokenForEmail(storedEmail);
          localStorage.setItem("crisp_user_token", storedToken);
        }
	        currentEmail = storedEmail;
	        currentName  = localStorage.getItem("crisp_user_name") || "";
        currentToken = storedToken;
	      }

	      function updateHeaderIdentity(email) {
	        if (isGuestEmail(email)) {
	          userPill.classList.remove("visible");
	          loginBtn.textContent = "Login";
	        } else {
	          userPillEmail.textContent = email;
	          userPill.classList.add("visible");
	          loginBtn.textContent = "Switch";
	        }
	      }
  
      // ── Notification helper ───────────────────────────────────────────────
      function sendNotification(title, body) {
        if (!("Notification" in window)) return;
        if (Notification.permission !== "granted") return;
  
        var notif = new Notification(title, {
          body:      body.length > 80 ? body.substring(0, 80) + "…" : body,
          icon:      "/logo.svg",
          badge:     "/logo.svg",
          tag:       "crisp-support",
          renotify:  true
        });
  
        notif.onclick = function () {
          window.focus();
          notif.close();
        };
  
        setTimeout(function () { notif.close(); }, 6000);
      }
  
      function requestNotificationPermission() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      }
  
      // ── Time formatter ────────────────────────────────────────────────────
      function formatTime(iso) {
        var d = new Date(iso);
        return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " +
               d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }
  
      // ── Scroll to bottom ──────────────────────────────────────────────────
      function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
  
      // ── Add a divider line ────────────────────────────────────────────────
      function addDivider(label) {
        var d = document.createElement("div");
        d.className = "divider";
        d.textContent = label;
        messagesEl.insertBefore(d, typingRow);
      }
  
      // ── Add a message bubble ──────────────────────────────────────────────
      function addBubble(message, sender, timeLabel, showSender) {
        // Redirect saved file messages to the richer file bubble renderer
        if (typeof message === "string" && message.indexOf("[FILE] ") === 0 && message.indexOf(" -> ") > -1) {
          var parts = message.substring(7).split(" -> ");
          var fileName = parts[0] || "Attachment";
          var fileUrl  = parts.slice(1).join(" -> ").trim();
          addFileBubble(fileUrl, fileName, "", sender, timeLabel, showSender);
          return;
        }

        var empty = messagesEl.querySelector(".chat-empty");
        if (empty) empty.remove();
  
        var row = document.createElement("div");
        row.className = "msg-row " + (sender === "operator" ? "operator" : "customer");
  
        if (showSender && sender === "operator") {
          var senderEl = document.createElement("div");
          senderEl.className = "msg-sender";
          senderEl.textContent = "Support";
          row.appendChild(senderEl);
        }
  
        var bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.textContent = message;

        row.appendChild(bubble);
  
        if (timeLabel) {
          var time = document.createElement("div");
          time.className = "msg-time";
          time.textContent = timeLabel;
          row.appendChild(time);
        }
  
        messagesEl.insertBefore(row, typingRow);
        scrollBottom();
      }
  
      // ── Typing indicator ──────────────────────────────────────────────────
      function showTyping() {
        typingRow.classList.add("show");
        scrollBottom();
      }
  
      function hideTyping() {
        typingRow.classList.remove("show");
      }

      var LOCAL_MSG_KEY = "crisp_local_messages_v1";

      function readLocalMessages() {
        try {
          var raw = localStorage.getItem(LOCAL_MSG_KEY);
          if (!raw) return [];
          var parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
          return [];
        }
      }

      function writeLocalMessages(list) {
        try {
          localStorage.setItem(LOCAL_MSG_KEY, JSON.stringify(list.slice(-200)));
        } catch (_) {}
      }

      function appendLocalMessage(message, sender) {
        var list = readLocalMessages();
        list.push({
          id: String(Date.now()) + "-" + String(Math.random()).slice(2),
          sender: sender,
          message: message,
          created_at: new Date().toISOString()
        });
        writeLocalMessages(list);
      }

      function migrateLocalMessagesToDb(email, done) {
        var local = readLocalMessages();
        if (!local || local.length === 0) {
          if (done) done();
          return;
        }

        var i = 0;
        function next() {
          if (i >= local.length) {
            localStorage.removeItem(LOCAL_MSG_KEY);
            if (done) done();
            return;
          }

          var m = local[i++];
          fetch("/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, message: m.message, sender: m.sender })
          })
            .then(function () { next(); })
            .catch(function () { next(); });
        }

        next();
      }
  
      // ── Save message to PostgreSQL ─────────────────────────────────────────
      function saveMessage(email, message, sender) {
        // Before login: keep everything locally. After login: save to DB.
        if (isGuestEmail(email)) {
          appendLocalMessage(message, sender);
          return;
        }

        fetch("/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, message: message, sender: sender })
        }).catch(function (e) {
          console.warn("save failed:", e);
        });
      }
  
      // ── Load history from PostgreSQL ───────────────────────────────────────
      function loadHistory(email, cb) {
        messagesEl.innerHTML = "";

        // Guest mode: show local messages only
        if (isGuestEmail(email)) {
          var local = readLocalMessages();
          if (!local || local.length === 0) {
            messagesEl.innerHTML =
              '<div class="chat-empty">' +
                '<div class="empty-icon">💬</div>' +
                '<p>No previous conversations.<br>Send a message to get started!</p>' +
              '</div>';
            messagesEl.appendChild(typingRow);
            if (cb) cb();
            return;
          }

          messagesEl.appendChild(typingRow);
          addDivider("This device");
          local.forEach(function (m) {
            addBubble(m.message, m.sender, formatTime(m.created_at), true);
          });
          addDivider("Live chat");
          if (cb) cb();
          return;
        }

        // Logged-in mode: migrate any locally stored guest chat, then load DB history
        migrateLocalMessagesToDb(email, function () {
          fetch("/messages?email=" + encodeURIComponent(email))
            .then(function (r) { return r.json(); })
            .then(function (rows) {
              messagesEl.innerHTML = "";

              if (!Array.isArray(rows) || rows.length === 0) {
                messagesEl.innerHTML =
                  '<div class="chat-empty">' +
                    '<div class="empty-icon">💬</div>' +
                    '<p>No previous conversations.<br>Send a message to get started!</p>' +
                  '</div>';
                messagesEl.appendChild(typingRow);
                if (cb) cb();
                return;
              }

              messagesEl.appendChild(typingRow);
              addDivider("Previous conversation");

              rows.forEach(function (m) {
                addBubble(m.message, m.sender, formatTime(m.created_at), true);
              });

              addDivider("Live chat");
              if (cb) cb();
            })
            .catch(function () {
              messagesEl.innerHTML = '<div class="chat-empty"><p>Could not load history.</p></div>';
              messagesEl.appendChild(typingRow);
              if (cb) cb();
            });
        });
      }
  
      // ── Send a message ─────────────────────────────────────────────────────
      function sendMessage() {
        var text = msgInput.value.trim();
        if (!text) return;
  
        msgInput.value = "";
        msgInput.style.height = "";
        sendBtn.disabled = true;
  
        addBubble(text, "customer", "Just now", false);
        saveMessage(currentEmail, text, "customer");
  
        if (window.$crisp) {
          window.$crisp.push(["do", "message:send", ["text", text]]);
        }
  
        setTimeout(function () { sendBtn.disabled = false; }, 400);
      }
  
      // ── Init Crisp (hidden engine) ─────────────────────────────────────────
      function initCrisp(email, name, token) {
        window.$crisp = [];
        window.CRISP_WEBSITE_ID = CRISP_ID;
        window.CRISP_TOKEN_ID = token || tokenForEmail(email);

        // Avoid throwing on invalid user values
        window.$crisp.push(["safe", true]);

        window.$crisp.push(["set", "user:email",    [email]]);
        window.$crisp.push(["set", "user:nickname", [name || (isGuestEmail(email) ? "Guest" : email.split("@")[0])]]);
  
        // Hide Crisp's own widget — we use our custom UI
        window.$crisp.push(["do", "chat:hide"]);
  
        // Incoming operator message
        window.$crisp.push(["on", "message:received", function (data) {
          if (!data) return;
          hideTyping();

          // Handle file/image messages from operator
          if (data.type === "file" && data.content && data.content.url) {
            var fName = data.content.name || "Attachment";
            var fUrl  = data.content.url;
            var fMime = data.content.type || "";
            addFileBubble(fUrl, fName, fMime, "operator", "Just now", true);
            saveMessage(email, "[FILE] " + fName + " -> " + fUrl, "operator");
          } else if (data.content) {
            addBubble(data.content, "operator", "Just now", true);
            saveMessage(email, data.content, "operator");
          } else {
            return;
          }

          // Notify customer if tab is not focused
          if (document.hidden || !document.hasFocus()) {
            var preview = (data.type === "file") ? "📎 " + (data.content && data.content.name || "File") : data.content;
            sendNotification("Support replied 💬", preview || "");
          }
        }]);
  
        // Operator is typing
        window.$crisp.push(["on", "message:composing:operator", function (data) {
          if (data && data.composing) {
            showTyping();
            clearTimeout(typingTimer);
            typingTimer = setTimeout(hideTyping, 5000);
          } else {
            hideTyping();
          }
        }]);
  
        var s = document.createElement("script");
        s.src   = "https://client.crisp.chat/l.js";
        s.async = 1;
        document.head.appendChild(s);
      }
  
      // ── Show main chat UI ──────────────────────────────────────────────────
      function showChat(email, name, token) {
        // Ask for notification permission as soon as user logs in
        requestNotificationPermission();
  
        emailGate.classList.remove("show");
        chatUI.classList.add("show");
        inputBar.style.display  = "flex";
        poweredBar.style.display = "block";
        updateHeaderIdentity(email);
  
        loadHistory(email, function () {
          initCrisp(email, name, token);
        });
      }
  
      // ── Auto-resize textarea ───────────────────────────────────────────────
      msgInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 110) + "px";
      });
  
      // Send on Enter, new line on Shift+Enter
      msgInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
  
      sendBtn.addEventListener("click", sendMessage);

      // ── Upload and send a file/image ───────────────────────────────────────
      function uploadAndSendFile(file) {
        if (!file) return;
        if (!window.$crisp) {
          alert("Chat is still loading. Please wait a moment and try again.");
          return;
        }

        // Show upload toast
        var toast = document.getElementById("upload-toast");
        var toastText = document.getElementById("upload-toast-text");
        var isImage = /^image\//i.test(file.type);
        toastText.textContent = isImage ? "Uploading image…" : "Uploading file…";
        toast.classList.add("show");
        attachBtn.disabled = true;

        var fd = new FormData();
        fd.append("file", file, file.name);

        fetch("/upload", { method: "POST", body: fd })
          .then(function (r) { return r.json(); })
          .then(function (out) {
            if (!out || !out.url) throw new Error("Upload failed");

            // Send to Crisp as a "file" message — shows in the operator dashboard
            window.$crisp.push(["do", "message:send", ["file", {
              name: out.name || file.name,
              url: out.url,
              type: out.type || file.type || "application/octet-stream"
            }]]);

            // Show in our custom UI
            addFileBubble(out.url, out.name || file.name, file.type, "customer", "Just now", false);
            saveMessage(currentEmail, "[FILE] " + (out.name || file.name) + " -> " + out.url, "customer");
          })
          .catch(function (e) {
            console.warn("upload failed:", e);
            alert("Upload failed. Max size is 10 MB. Please try again.");
          })
          .finally(function () {
            toast.classList.remove("show");
            attachBtn.disabled = false;
            fileInput.value = "";
          });
      }

      // ── Render a file/image attachment bubble ─────────────────────────────
      function addFileBubble(url, name, mimeType, sender, timeLabel, showSender) {
        var empty = messagesEl.querySelector(".chat-empty");
        if (empty) empty.remove();

        var row = document.createElement("div");
        row.className = "msg-row " + (sender === "operator" ? "operator" : "customer");

        if (showSender && sender === "operator") {
          var senderEl = document.createElement("div");
          senderEl.className = "msg-sender";
          senderEl.textContent = "Support";
          row.appendChild(senderEl);
        }

        var bubble = document.createElement("div");
        bubble.className = "msg-bubble";

        var isImage = /^image\//i.test(mimeType) || /\.(png|jpe?g|gif|webp)$/i.test(url);

        if (isImage) {
          var img = document.createElement("img");
          img.src = url;
          img.alt = name || "Image";
          img.className = "attach-img";
          img.loading = "lazy";
          img.onclick = function () { window.open(url, "_blank"); };
          bubble.appendChild(img);
        } else {
          var link = document.createElement("a");
          link.href = url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.className = "attach-link";
          link.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
          link.appendChild(document.createTextNode(name || "Attachment"));
          bubble.appendChild(link);
        }

        row.appendChild(bubble);

        if (timeLabel) {
          var time = document.createElement("div");
          time.className = "msg-time";
          time.textContent = timeLabel;
          row.appendChild(time);
        }

        messagesEl.insertBefore(row, typingRow);
        scrollBottom();
      }

      attachBtn.addEventListener("click", function () {
        fileInput.click();
      });

      fileInput.addEventListener("change", function () {
        var file = this.files && this.files[0];
        if (file) uploadAndSendFile(file);
      });

      // Drag-and-drop onto the chat area
      messagesEl.addEventListener("dragover", function (e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "copy";
      });
      messagesEl.addEventListener("drop", function (e) {
        e.preventDefault();
        var file = e.dataTransfer.files && e.dataTransfer.files[0];
        if (file) uploadAndSendFile(file);
      });
  
      // ── Logout ─────────────────────────────────────────────────────────────
      logoutBtn.addEventListener("click", function () {
        localStorage.removeItem("crisp_user_email");
        localStorage.removeItem("crisp_user_name");
        localStorage.removeItem("crisp_user_token");
        window.location.reload();
      });

      // â”€â”€ Login button: open optional gate â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      loginBtn.addEventListener("click", function () {
        // If currently a real user, prefill for quick edits
        if (currentEmail && !isGuestEmail(currentEmail)) {
          emailInput.value = currentEmail;
        } else {
          emailInput.value = "";
        }
        // nameInput.value = currentName || "";

        gateBtn.disabled = false;
        gateBtn.textContent = "Continue →";
        emailGate.classList.add("show");
        // setTimeout(function () { nameInput.focus(); }, 0);
      });

      // Close gate on backdrop click / Escape
      emailGate.addEventListener("click", function (e) {
        if (e.target === emailGate) emailGate.classList.remove("show");
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") emailGate.classList.remove("show");
      });
  
      // ── Gate form submit ───────────────────────────────────────────────────
      emailForm.addEventListener("submit", function (e) {
        e.preventDefault();
  
        var email = emailInput.value.trim();
        // var name  = nameInput.value.trim();

        // If email is provided, it should look like an email (basic check)
        if (email && email.indexOf("@") === -1) {
          emailInput.focus();
          return;
        }
  
        gateBtn.disabled    = true;
        gateBtn.textContent = "Connecting…";
  
        // No email entered: keep current (guest) identity, just save the name if any
        if (!email) {
          localStorage.setItem("crisp_user_name", name);
          if (!currentToken) {
            currentToken = isGuestEmail(currentEmail) ? createGuestToken() : tokenForEmail(currentEmail);
            localStorage.setItem("crisp_user_token", currentToken);
          }
          // currentName = name;
          // if (window.$crisp && name) {
          //   window.$crisp.push(["set", "user:nickname", [name]]);
          // }
          emailGate.classList.remove("show");
          gateBtn.disabled = false;
          gateBtn.textContent = "Continue →";
          updateHeaderIdentity(currentEmail);
          return;
        }

        localStorage.setItem("crisp_user_email", email);
        localStorage.setItem("crisp_user_name",  name);
        localStorage.setItem("crisp_user_token", tokenForEmail(email));
  
        currentEmail = email;
        currentName  = name;
        currentToken = tokenForEmail(email);
  
        // Switching identity is simplest via reload (avoids double Crisp bootstraps)
        window.location.reload();
      });
  
      // ── Auto-login if email already saved ──────────────────────────────────
      ensureIdentity();
      showChat(currentEmail, currentName, currentToken);
  
    })();
  </script>
