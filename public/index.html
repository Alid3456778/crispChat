<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrispChat — Customer Support</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://client.crisp.chat" crossorigin />

  <style>
    :root{
      --bg0:#060a12;
      --bg1:#0b1220;
      --bg2:#0f1b33;
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.52);
      --line:rgba(255,255,255,0.09);
      --accent0:#7c3aed;
      --accent1:#22d3ee;
      --header-h:62px;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}

    body{
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 600px at 15% 0%,rgba(124,58,237,0.25),transparent 55%),
        radial-gradient(700px 500px at 88% 20%,rgba(34,211,238,0.15),transparent 60%),
        linear-gradient(180deg,var(--bg0),var(--bg1) 50%,var(--bg2));
    }

    .app{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
    }

    header{
      height:var(--header-h);
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      border-bottom:1px solid var(--line);
      background:rgba(6,10,18,0.7);
      backdrop-filter:blur(16px);
      z-index:20;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      user-select:none;
    }

    .brand img{width:30px;height:30px}
    .brand .name{font-size:15px;font-weight:700}
    .brand .tag{
      padding:3px 10px;
      border:1px solid rgba(255,255,255,0.13);
      border-radius:999px;
      font-size:11px;
      color:var(--muted);
      background:rgba(255,255,255,0.06);
    }

    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .online-badge{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:var(--muted);
    }

    .online-dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#22c55e;
      box-shadow:0 0 6px rgba(34,197,94,0.7);
      animation:pulse 2s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.45}
    }

    .user-pill{
      display:none;
      align-items:center;
      gap:7px;
      padding:5px 12px;
      border:1px solid rgba(255,255,255,0.11);
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      background:rgba(255,255,255,0.06);
    }

    .user-pill.visible{display:flex}

    .user-pill button{
      background:none;
      border:none;
      cursor:pointer;
      color:rgba(255,255,255,0.28);
      font-size:14px;
      padding:0 0 0 3px;
      transition:color 150ms;
      line-height:1;
    }

    .user-pill button:hover{color:rgba(255,255,255,0.7)}

    main{
      flex:1;
      position:relative;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    #email-gate{
      display:none;
      position:absolute;
      inset:0;
      z-index:30;
      background:rgba(6,10,18,0.92);
      backdrop-filter:blur(14px);
      align-items:center;
      justify-content:center;
    }

    #email-gate.show{display:flex}

    .gate-card{
      width:min(420px,92vw);
      background:rgba(11,18,32,0.97);
      border:1px solid rgba(255,255,255,0.11);
      border-radius:22px;
      padding:38px 32px;
      box-shadow:0 28px 90px rgba(0,0,0,0.7);
    }

    .gate-icon{
      width:48px;
      height:48px;
      border-radius:14px;
      margin-bottom:18px;
      background:linear-gradient(135deg,var(--accent0),var(--accent1));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
    }

    .gate-card h2{
      font-size:21px;
      font-weight:700;
      margin-bottom:6px;
    }

    .gate-card p{
      font-size:13px;
      color:var(--muted);
      margin-bottom:28px;
      line-height:1.55;
    }

    .field-label{
      display:block;
      font-size:11px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.6px;
      color:rgba(255,255,255,0.35);
      margin-bottom:7px;
    }

    .field-input{
      width:100%;
      padding:11px 15px;
      margin-bottom:15px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:12px;
      color:#fff;
      font-size:14px;
      outline:none;
      transition:border-color 160ms;
    }

    .field-input:focus{border-color:rgba(124,58,237,0.8)}
    .field-input::placeholder{color:rgba(255,255,255,0.2)}

    .btn-primary{
      width:100%;
      padding:13px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent0),var(--accent1));
      color:#fff;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:opacity 160ms;
      margin-top:4px;
    }

    .btn-primary:hover{opacity:.85}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}

    #chat-ui{
      display:none;
      flex:1;
      flex-direction:column;
      overflow:hidden;
    }

    #chat-ui.show{display:flex}

    #messages{
      flex:1;
      overflow-y:auto;
      padding:20px 16px;
      display:flex;
      flex-direction:column;
      gap:4px;
      scrollbar-width:thin;
      scrollbar-color:rgba(255,255,255,0.08) transparent;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:11px;
      color:rgba(255,255,255,0.28);
      margin:12px 0 8px;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:rgba(255,255,255,0.07);
    }

    .msg-row{
      display:flex;
      flex-direction:column;
      max-width:72%;
    }

    .msg-row.customer{
      align-self:flex-end;
      align-items:flex-end;
    }

    .msg-row.operator{
      align-self:flex-start;
      align-items:flex-start;
    }

    .msg-sender{
      font-size:11px;
      color:var(--muted);
      margin-bottom:3px;
      padding:0 4px;
    }

    .msg-bubble{
      padding:10px 15px;
      border-radius:18px;
      font-size:14px;
      line-height:1.45;
      word-break:break-word;
      max-width:100%;
    }

    .msg-row.customer .msg-bubble{
      background:linear-gradient(135deg,#6d28d9,#5b5ef4);
      color:#fff;
      border-bottom-right-radius:5px;
    }

    .msg-row.operator .msg-bubble{
      background:rgba(255,255,255,0.11);
      color:var(--text);
      border-bottom-left-radius:5px;
    }

    .msg-time{
      font-size:10px;
      color:rgba(255,255,255,0.22);
      margin-top:4px;
      padding:0 4px;
    }

    #typing-row{
      display:none;
      align-self:flex-start;
      align-items:flex-end;
      gap:8px;
      margin-top:4px;
    }

    #typing-row.show{display:flex}

    .typing-bubble{
      padding:10px 16px;
      border-radius:18px;
      border-bottom-left-radius:5px;
      background:rgba(255,255,255,0.1);
      display:flex;
      align-items:center;
      gap:4px;
    }

    .typing-bubble span{
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(255,255,255,0.45);
      animation:bounce 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2){animation-delay:.15s}
    .typing-bubble span:nth-child(3){animation-delay:.30s}

    @keyframes bounce{
      0%,80%,100%{transform:translateY(0)}
      40%{transform:translateY(-5px)}
    }

    .chat-empty{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,0.22);
      text-align:center;
      gap:10px;
      padding:32px;
    }

    .chat-empty .empty-icon{
      font-size:36px;
      opacity:.4;
    }

    .chat-empty p{
      font-size:13px;
      line-height:1.6;
    }

    #input-bar{
      flex-shrink:0;
      height:70px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 16px;
      border-top:1px solid var(--line);
      background:rgba(6,10,18,0.6);
      backdrop-filter:blur(12px);
    }

    #msg-input{
      flex:1;
      padding:11px 16px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:999px;
      color:#fff;
      font-size:14px;
      outline:none;
      resize:none;
      max-height:110px;
      line-height:1.4;
      transition:border-color 160ms;
      font-family:inherit;
    }

    #msg-input:focus{border-color:rgba(124,58,237,0.7)}
    #msg-input::placeholder{color:rgba(255,255,255,0.25)}

    #send-btn{
      width:42px;
      height:42px;
      flex-shrink:0;
      border:none;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent0),var(--accent1));
      color:#fff;
      font-size:17px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity 160ms,transform 100ms;
    }

    #send-btn:hover{opacity:.85}
    #send-btn:active{transform:scale(.92)}
    #send-btn:disabled{opacity:.35;cursor:not-allowed}

    .powered{
      text-align:center;
      font-size:10px;
      color:rgba(255,255,255,0.18);
      padding:5px 0 6px;
      flex-shrink:0;
    }

    /* Hide EVERYTHING Crisp renders on screen */
.crisp-client,
.crisp-client .cc-1brb6,
.crisp-client .cc-kv6t,
#crisp-chatbox {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

    @media(max-width:480px){
      .brand .tag,.online-badge{display:none}
      .msg-row{max-width:88%}
      #messages{padding:14px 10px}
      #input-bar{padding:0 10px}
    }

    @media(prefers-reduced-motion:reduce){
      .online-dot,.typing-bubble span{animation:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="/logo.svg" alt="CrispChat" width="30" height="30" />
        <div class="name">CrispChat</div>
        <div class="tag">Support</div>
      </div>

      <div class="header-right">
        <div class="online-badge">
          <div class="online-dot"></div>
          <span>Online</span>
        </div>

        <div id="user-pill" class="user-pill">
          <span id="user-pill-email"></span>
          <button id="logout-btn" title="Switch account">✕</button>
        </div>
      </div>
    </header>

    <main>
      <div id="email-gate" class="show" role="dialog" aria-modal="true" aria-labelledby="gate-title">
        <div class="gate-card">
          <div class="gate-icon">💬</div>
          <h2 id="gate-title">Start a conversation</h2>
          <p>Enter your email and we'll load your full chat history. Your conversations are saved and available on any device.</p>

          <form id="email-form" novalidate>
            <label class="field-label" for="name-input">Your name (optional)</label>
            <input id="name-input" class="field-input" type="text" placeholder="e.g. Thaqib" autocomplete="name" />

            <label class="field-label" for="email-input">Email address *</label>
            <input id="email-input" class="field-input" type="email" placeholder="you@example.com" required autocomplete="email" />

            <button type="submit" class="btn-primary" id="gate-btn">Open Chat →</button>
          </form>
        </div>
      </div>

      <div id="chat-ui">
        <div id="messages" role="log" aria-live="polite"></div>

        <div id="typing-row">
          <div class="typing-bubble">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </main>

    <div id="input-bar" style="display:none;">
      <textarea id="msg-input" rows="1" placeholder="Type a message…" aria-label="Message input"></textarea>

      <button id="send-btn" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="powered" id="powered-bar" style="display:none;">Powered by Crisp</div>
  </div>

  <script>
    (function () {
      "use strict";
  
      var CRISP_ID = "68987257-808e-403d-a06c-35b3ec18c3ef";
  
      var currentEmail = localStorage.getItem("crisp_user_email") || "";
      var currentName  = localStorage.getItem("crisp_user_name")  || "";
  
      var emailGate     = document.getElementById("email-gate");
      var emailForm     = document.getElementById("email-form");
      var emailInput    = document.getElementById("email-input");
      var nameInput     = document.getElementById("name-input");
      var gateBtn       = document.getElementById("gate-btn");
      var chatUI        = document.getElementById("chat-ui");
      var messagesEl    = document.getElementById("messages");
      var typingRow     = document.getElementById("typing-row");
      var inputBar      = document.getElementById("input-bar");
      var poweredBar    = document.getElementById("powered-bar");
      var msgInput      = document.getElementById("msg-input");
      var sendBtn       = document.getElementById("send-btn");
      var userPill      = document.getElementById("user-pill");
      var userPillEmail = document.getElementById("user-pill-email");
      var logoutBtn     = document.getElementById("logout-btn");
      var typingTimer   = null;
  
      // ── Notification helper ───────────────────────────────────────────────
      function sendNotification(title, body) {
        if (!("Notification" in window)) return;
        if (Notification.permission !== "granted") return;
  
        var notif = new Notification(title, {
          body:      body.length > 80 ? body.substring(0, 80) + "…" : body,
          icon:      "/logo.svg",
          badge:     "/logo.svg",
          tag:       "crisp-support",
          renotify:  true
        });
  
        notif.onclick = function () {
          window.focus();
          notif.close();
        };
  
        setTimeout(function () { notif.close(); }, 6000);
      }
  
      function requestNotificationPermission() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      }
  
      // ── Time formatter ────────────────────────────────────────────────────
      function formatTime(iso) {
        var d = new Date(iso);
        return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " +
               d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }
  
      // ── Scroll to bottom ──────────────────────────────────────────────────
      function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
  
      // ── Add a divider line ────────────────────────────────────────────────
      function addDivider(label) {
        var d = document.createElement("div");
        d.className = "divider";
        d.textContent = label;
        messagesEl.insertBefore(d, typingRow);
      }
  
      // ── Add a message bubble ──────────────────────────────────────────────
      function addBubble(message, sender, timeLabel, showSender) {
        var empty = messagesEl.querySelector(".chat-empty");
        if (empty) empty.remove();
  
        var row = document.createElement("div");
        row.className = "msg-row " + (sender === "operator" ? "operator" : "customer");
  
        if (showSender && sender === "operator") {
          var senderEl = document.createElement("div");
          senderEl.className = "msg-sender";
          senderEl.textContent = "Support";
          row.appendChild(senderEl);
        }
  
        var bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.textContent = message;
        row.appendChild(bubble);
  
        if (timeLabel) {
          var time = document.createElement("div");
          time.className = "msg-time";
          time.textContent = timeLabel;
          row.appendChild(time);
        }
  
        messagesEl.insertBefore(row, typingRow);
        scrollBottom();
      }
  
      // ── Typing indicator ──────────────────────────────────────────────────
      function showTyping() {
        typingRow.classList.add("show");
        scrollBottom();
      }
  
      function hideTyping() {
        typingRow.classList.remove("show");
      }
  
      // ── Save message to PostgreSQL ─────────────────────────────────────────
      function saveMessage(email, message, sender) {
        fetch("/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, message: message, sender: sender })
        }).catch(function (e) {
          console.warn("save failed:", e);
        });
      }
  
      // ── Load history from PostgreSQL ───────────────────────────────────────
      function loadHistory(email, cb) {
        fetch("/messages?email=" + encodeURIComponent(email))
          .then(function (r) { return r.json(); })
          .then(function (rows) {
            messagesEl.innerHTML = "";
  
            if (!Array.isArray(rows) || rows.length === 0) {
              messagesEl.innerHTML =
                '<div class="chat-empty">' +
                  '<div class="empty-icon">💬</div>' +
                  '<p>No previous conversations.<br>Send a message to get started!</p>' +
                '</div>';
              messagesEl.appendChild(typingRow);
              if (cb) cb();
              return;
            }
  
            messagesEl.appendChild(typingRow);
            addDivider("Previous conversation");
  
            rows.forEach(function (m) {
              addBubble(m.message, m.sender, formatTime(m.created_at), true);
            });
  
            addDivider("Live chat");
            if (cb) cb();
          })
          .catch(function () {
            messagesEl.innerHTML = '<div class="chat-empty"><p>Could not load history.</p></div>';
            messagesEl.appendChild(typingRow);
            if (cb) cb();
          });
      }
  
      // ── Send a message ─────────────────────────────────────────────────────
      function sendMessage() {
        var text = msgInput.value.trim();
        if (!text) return;
  
        msgInput.value = "";
        msgInput.style.height = "";
        sendBtn.disabled = true;
  
        addBubble(text, "customer", "Just now", false);
        saveMessage(currentEmail, text, "customer");
  
        if (window.$crisp) {
          window.$crisp.push(["do", "message:send", ["text", text]]);
        }
  
        setTimeout(function () { sendBtn.disabled = false; }, 400);
      }
  
      // ── Init Crisp (hidden engine) ─────────────────────────────────────────
      function initCrisp(email, name) {
        window.$crisp = [];
        window.CRISP_WEBSITE_ID = CRISP_ID;
  
        window.$crisp.push(["set", "user:email",    [email]]);
        window.$crisp.push(["set", "user:nickname", [name || email.split("@")[0]]]);
  
        // Hide Crisp's own widget — we use our custom UI
        window.$crisp.push(["do", "chat:hide"]);
  
        // Incoming operator message
        window.$crisp.push(["on", "message:received", function (data) {
          if (!data || !data.content) return;
          hideTyping();
          addBubble(data.content, "operator", "Just now", true);
          saveMessage(email, data.content, "operator");
  
          // Notify customer if tab is not focused
          if (document.hidden || !document.hasFocus()) {
            sendNotification("Support replied 💬", data.content);
          }
        }]);
  
        // Operator is typing
        window.$crisp.push(["on", "message:composing:operator", function (data) {
          if (data && data.composing) {
            showTyping();
            clearTimeout(typingTimer);
            typingTimer = setTimeout(hideTyping, 5000);
          } else {
            hideTyping();
          }
        }]);
  
        var s = document.createElement("script");
        s.src   = "https://client.crisp.chat/l.js";
        s.async = 1;
        document.head.appendChild(s);
      }
  
      // ── Show main chat UI ──────────────────────────────────────────────────
      function showChat(email, name) {
        // Ask for notification permission as soon as user logs in
        requestNotificationPermission();
  
        emailGate.classList.remove("show");
        chatUI.classList.add("show");
        inputBar.style.display  = "flex";
        poweredBar.style.display = "block";
        userPillEmail.textContent = email;
        userPill.classList.add("visible");
  
        loadHistory(email, function () {
          initCrisp(email, name);
        });
      }
  
      // ── Auto-resize textarea ───────────────────────────────────────────────
      msgInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 110) + "px";
      });
  
      // Send on Enter, new line on Shift+Enter
      msgInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
  
      sendBtn.addEventListener("click", sendMessage);
  
      // ── Logout ─────────────────────────────────────────────────────────────
      logoutBtn.addEventListener("click", function () {
        localStorage.removeItem("crisp_user_email");
        localStorage.removeItem("crisp_user_name");
        window.location.reload();
      });
  
      // ── Gate form submit ───────────────────────────────────────────────────
      emailForm.addEventListener("submit", function (e) {
        e.preventDefault();
  
        var email = emailInput.value.trim();
        var name  = nameInput.value.trim();
        if (!email) return;
  
        gateBtn.disabled    = true;
        gateBtn.textContent = "Connecting…";
  
        localStorage.setItem("crisp_user_email", email);
        localStorage.setItem("crisp_user_name",  name);
  
        currentEmail = email;
        currentName  = name;
  
        showChat(email, name);
      });
  
      // ── Auto-login if email already saved ──────────────────────────────────
      if (currentEmail) {
        showChat(currentEmail, currentName);
      }
  
    })();
  </script>
</body>
</html>
