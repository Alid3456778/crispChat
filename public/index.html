<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b1220" />
  <title>CrispChat — Customer Support</title>
  <meta name="description" content="Instant customer support chat powered by Crisp." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://client.crisp.chat" crossorigin />
  <link rel="dns-prefetch" href="//client.crisp.chat" />

<style>
  :root {
    --bg0: #060a12;
    --bg1: #0b1220;
    --bg2: #0f1b33;
    --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.55);
    --line: rgba(255,255,255,0.10);
    --accent0: #7c3aed;
    --accent1: #22d3ee;
    --header-h: 64px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    overflow: hidden;
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background:
      radial-gradient(900px 600px at 20% 0%,   rgba(124,58,237,0.28),  transparent 55%),
      radial-gradient(800px 550px at 85% 25%,  rgba(34,211,238,0.18),  transparent 60%),
      radial-gradient(900px 700px at 50% 120%, rgba(2,132,199,0.12),   transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1) 45%, var(--bg2));
  }

  .app { position: fixed; inset: 0; display: flex; flex-direction: column; }

  /* ── Header ── */
  header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    background: rgba(6,10,18,0.6);
    backdrop-filter: blur(12px);
    z-index: 10;
    flex-shrink: 0;
  }

  .brand { display: inline-flex; align-items: center; gap: 10px; user-select: none; }
  .brand img { width: 32px; height: 32px; }
  .brand .name { font-size: 14px; font-weight: 700; letter-spacing: 0.2px; }
  .brand .tag {
    margin-left: 8px; padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.14); border-radius: 999px;
    font-size: 12px; color: var(--muted); background: rgba(255,255,255,0.06);
  }

  /* ── User pill shown after login ── */
  .user-pill {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    font-size: 13px;
    color: var(--muted);
  }
  .user-pill.visible { display: flex; }
  .user-pill button {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.35); font-size: 16px; line-height: 1;
    padding: 0 0 0 4px;
    transition: color 150ms;
  }
  .user-pill button:hover { color: rgba(255,255,255,0.7); }

  /* ── Main layout: history panel + crisp side by side ── */
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* ── Email Gate overlay ── */
  #email-gate {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 20;
    background: rgba(6,10,18,0.88);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
  }
  #email-gate.show { display: flex; }

  .gate-card {
    width: min(440px, 92vw);
    background: rgba(15,23,42,0.92);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .gate-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .gate-card p  { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

  .field-label {
    display: block; font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.4); letter-spacing: 0.7px;
    text-transform: uppercase; margin-bottom: 7px;
  }
  .field-input {
    width: 100%; padding: 11px 15px; margin-bottom: 18px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 12px; color: #fff; font-size: 14px; outline: none;
    transition: border-color 150ms;
  }
  .field-input:focus { border-color: rgba(124,58,237,0.7); }
  .field-input::placeholder { color: rgba(255,255,255,0.25); }

  .btn-primary {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--accent0), var(--accent1));
    border: none; border-radius: 12px;
    color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 150ms;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── History panel (left side) ── */
  #history-panel {
    display: none;
    flex-direction: column;
    width: 380px;
    min-width: 280px;
    max-width: 40vw;
    border-right: 1px solid var(--line);
    background: rgba(6,10,18,0.45);
    backdrop-filter: blur(8px);
    overflow: hidden;
    flex-shrink: 0;
  }
  #history-panel.show { display: flex; }

  .history-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .history-header h3 { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .history-header p  { font-size: 11px; color: var(--muted); }

  #history-box {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .msg-row { display: flex; flex-direction: column; }
  .msg-row.customer { align-items: flex-end; }
  .msg-row.operator { align-items: flex-start; }

  .msg-bubble {
    max-width: 82%;
    padding: 9px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.45;
    word-break: break-word;
  }
  .msg-row.customer .msg-bubble {
    background: rgba(124,58,237,0.55);
    border-bottom-right-radius: 4px;
  }
  .msg-row.operator .msg-bubble {
    background: rgba(255,255,255,0.1);
    border-bottom-left-radius: 4px;
  }
  .msg-meta {
    font-size: 10px;
    color: rgba(255,255,255,0.28);
    margin-top: 4px;
    padding: 0 4px;
  }

  .history-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.25); text-align: center; padding: 24px;
    gap: 8px;
  }
  .history-empty svg { opacity: 0.3; }
  .history-empty p { font-size: 13px; }

  /* ── Crisp area (right side) ── */
  #crisp-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* ── Loading overlay ── */
  .loading {
    position: absolute; inset: 0;
    display: grid; place-items: center; padding: 18px;
    z-index: 5; pointer-events: none;
    transition: opacity 300ms ease;
  }
  .loading.hidden { opacity: 0; }

  .loading-card {
    width: min(520px, 92vw);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(15,23,42,0.3);
    box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }
  .loading-top {
    padding: 18px 18px 12px;
    display: flex; align-items: center; gap: 14px;
  }
  .spinner {
    width: 38px; height: 38px; border-radius: 999px; flex: 0 0 auto;
    background:
      conic-gradient(from 0deg, var(--accent0), var(--accent1), var(--accent0));
    -webkit-mask: radial-gradient(circle at 50% 50%, transparent 56%, #000 58%);
    mask: radial-gradient(circle at 50% 50%, transparent 56%, #000 58%);
    animation: spin 900ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text h2 { font-size: 17px; font-weight: 700; }
  .loading-text p  { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .dots::after {
    content: ""; display: inline-block; width: 1.2em; text-align: left;
    animation: dots 1200ms steps(4, end) infinite;
  }
  @keyframes dots {
    0%  { content: ""; }  25% { content: "."; }
    50% { content: ".."; } 75% { content: "..."; }
  }
  .loading-bar { height: 5px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .loading-bar > div {
    height: 100%; width: 38%;
    background: linear-gradient(90deg, var(--accent0), var(--accent1));
    border-radius: 999px;
    animation: bar 1100ms ease-in-out infinite;
  }
  @keyframes bar {
    0%   { transform: translateX(-70%);  opacity: 0.5; }
    50%  { transform: translateX(80%);   opacity: 1;   }
    100% { transform: translateX(230%);  opacity: 0.5; }
  }

  /* ── Fullscreen Crisp widget overrides ── */
  .crisp-client .cc-kv6t {
    width:  100% !important;
    height: 100% !important;
    bottom: 0 !important;
    right:  0 !important;
    top:    0 !important;
    border-radius: 0 !important;
  }
  .crisp-client .cc-1brb6 { display: none !important; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    #history-panel { width: 100%; max-width: 100%; border-right: none; border-bottom: 1px solid var(--line); max-height: 260px; }
    main { flex-direction: column; }
    .brand .tag { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .spinner, .loading-bar > div { animation: none; }
    .dots::after { animation: none; content: "..."; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="brand" aria-label="CrispChat">
      <img src="/logo.svg" alt="CrispChat logo" width="32" height="32" />
      <div class="name">CrispChat</div>
      <div class="tag">Support</div>
    </div>
    <div id="user-pill" class="user-pill" aria-live="polite">
      <span id="user-pill-email"></span>
      <button id="logout-btn" aria-label="Switch account" title="Switch account">✕</button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Email gate overlay -->
    <div id="email-gate" class="show" role="dialog" aria-modal="true" aria-labelledby="gate-title">
      <div class="gate-card">
        <h2 id="gate-title">Welcome to Support 👋</h2>
        <p>Enter your email to start chatting. We'll load your full chat history automatically on your next visit.</p>
        <form id="email-form" novalidate>
          <label class="field-label" for="name-input">Your name (optional)</label>
          <input id="name-input" class="field-input" type="text" placeholder="e.g. Thaqib" autocomplete="name" />

          <label class="field-label" for="email-input">Email address *</label>
          <input id="email-input" class="field-input" type="email" placeholder="you@example.com" required autocomplete="email" />

          <button type="submit" class="btn-primary" id="gate-btn">Open Chat →</button>
        </form>
      </div>
    </div>

    <!-- History panel -->
    <div id="history-panel" aria-label="Chat history">
      <div class="history-header">
        <h3>Chat History</h3>
        <p id="history-subtitle">Previous conversations</p>
      </div>
      <div id="history-box" role="log" aria-live="off"></div>
    </div>

    <!-- Crisp live chat area -->
    <div id="crisp-area">
      <div class="loading" id="loading-overlay" role="status" aria-live="polite">
        <div class="loading-card">
          <div class="loading-top">
            <div class="spinner" aria-hidden="true"></div>
            <div class="loading-text">
              <h2>Opening chat<span class="dots" aria-hidden="true"></span></h2>
              <p>Connecting you to our support team.</p>
            </div>
          </div>
          <div class="loading-bar" aria-hidden="true"><div></div></div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
(function () {
  "use strict";

  // ── State ────────────────────────────────────────────────────────────────
  var currentEmail   = localStorage.getItem("crisp_user_email") || "";
  var currentName    = localStorage.getItem("crisp_user_name")  || "";
  var crispLoaded    = false;
  var saveQueue      = [];   // messages waiting to be saved

  // ── DOM refs ─────────────────────────────────────────────────────────────
  var emailGate      = document.getElementById("email-gate");
  var emailForm      = document.getElementById("email-form");
  var emailInput     = document.getElementById("email-input");
  var nameInput      = document.getElementById("name-input");
  var gateBtn        = document.getElementById("gate-btn");
  var historyPanel   = document.getElementById("history-panel");
  var historyBox     = document.getElementById("history-box");
  var historySubtitle= document.getElementById("history-subtitle");
  var loadingOverlay = document.getElementById("loading-overlay");
  var userPill       = document.getElementById("user-pill");
  var userPillEmail  = document.getElementById("user-pill-email");
  var logoutBtn      = document.getElementById("logout-btn");

  // ── Helpers ──────────────────────────────────────────────────────────────
  function formatTime(iso) {
    var d = new Date(iso);
    return d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── Save a message to PostgreSQL ─────────────────────────────────────────
  function saveMessage(email, message, sender) {
    fetch("/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, message: message, sender: sender || "customer" })
    }).catch(function(e){ console.warn("Save message failed:", e); });
  }

  // ── Load history from PostgreSQL ─────────────────────────────────────────
  function loadHistory(email) {
    historyBox.innerHTML = '<div class="history-empty"><p>Loading history…</p></div>';

    fetch("/messages?email=" + encodeURIComponent(email))
      .then(function(r){ return r.json(); })
      .then(function(messages) {
        if (!Array.isArray(messages) || messages.length === 0) {
          historyBox.innerHTML =
            '<div class="history-empty">' +
              '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
              '<p>No previous chats found.<br>Your conversations will appear here.</p>' +
            '</div>';
          historySubtitle.textContent = "No previous chats";
          return;
        }

        historySubtitle.textContent = messages.length + " message" + (messages.length !== 1 ? "s" : "");
        historyBox.innerHTML = "";

        messages.forEach(function(m) {
          var row = document.createElement("div");
          row.className = "msg-row " + (m.sender === "operator" ? "operator" : "customer");

          var bubble = document.createElement("div");
          bubble.className = "msg-bubble";
          bubble.textContent = m.message;

          var meta = document.createElement("div");
          meta.className = "msg-meta";
          meta.textContent = (m.sender === "operator" ? "Support" : "You") + " · " + formatTime(m.created_at);

          row.appendChild(bubble);
          row.appendChild(meta);
          historyBox.appendChild(row);
        });

        // Scroll to bottom
        historyBox.scrollTop = historyBox.scrollHeight;
      })
      .catch(function() {
        historyBox.innerHTML = '<div class="history-empty"><p>Could not load history.</p></div>';
      });
  }

  // ── Init Crisp with user identity ────────────────────────────────────────
  function initCrisp(email, name) {
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "68987257-808e-403d-a06c-35b3ec18c3ef";

    // Set identity before loading script
    window.$crisp.push(["set", "user:email",    [email]]);
    window.$crisp.push(["set", "user:nickname", [name || email.split("@")[0]]]);

    // Listen for messages sent by customer → save to DB
    window.$crisp.push(["on", "message:sent", function(data) {
      if (data && data.content) {
        saveMessage(email, data.content, "customer");
        // Also add to history panel immediately
        appendToHistory(data.content, "customer");
      }
    }]);

    // Listen for messages received from operator → save to DB
    window.$crisp.push(["on", "message:received", function(data) {
      if (data && data.content) {
        saveMessage(email, data.content, "operator");
        appendToHistory(data.content, "operator");
      }
    }]);

    // Load Crisp script
    var s = document.createElement("script");
    s.src   = "https://client.crisp.chat/l.js";
    s.async = 1;
    document.head.appendChild(s);

    waitForCrisp(12000);
  }

  // ── Append a new message to history panel in real time ───────────────────
  function appendToHistory(message, sender) {
    // Remove empty state if present
    var empty = historyBox.querySelector(".history-empty");
    if (empty) empty.remove();

    var row = document.createElement("div");
    row.className = "msg-row " + (sender === "operator" ? "operator" : "customer");

    var bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = message;

    var meta = document.createElement("div");
    meta.className = "msg-meta";
    meta.textContent = (sender === "operator" ? "Support" : "You") + " · Just now";

    row.appendChild(bubble);
    row.appendChild(meta);
    historyBox.appendChild(row);
    historyBox.scrollTop = historyBox.scrollHeight;

    // Update subtitle count
    var count = historyBox.querySelectorAll(".msg-row").length;
    historySubtitle.textContent = count + " message" + (count !== 1 ? "s" : "");
  }

  // ── Open chat widget ──────────────────────────────────────────────────────
  function openChat() {
    if (window.$crisp) {
      window.$crisp.push(["do", "chat:show"]);
      window.$crisp.push(["do", "chat:open"]);
    }
  }

  // ── Wait for Crisp to render ──────────────────────────────────────────────
  function waitForCrisp(maxWaitMs) {
    var start = Date.now();
    var timer = setInterval(function () {
      if (document.querySelector(".crisp-client")) {
        clearInterval(timer);
        crispLoaded = true;
        loadingOverlay.classList.add("hidden");
        openChat();
        return;
      }
      if (Date.now() - start > maxWaitMs) {
        clearInterval(timer);
        loadingOverlay.classList.add("hidden");
      }
    }, 120);
  }

  // ── Show main UI after login ──────────────────────────────────────────────
  function showMainUI(email, name) {
    emailGate.classList.remove("show");
    historyPanel.classList.add("show");

    userPillEmail.textContent = email;
    userPill.classList.add("visible");

    loadHistory(email);
    setTimeout(function () { initCrisp(email, name); }, 200);
    setInterval(openChat, 7000);
  }

  // ── Logout / switch account ───────────────────────────────────────────────
  logoutBtn.addEventListener("click", function () {
    localStorage.removeItem("crisp_user_email");
    localStorage.removeItem("crisp_user_name");
    // Reload page to reset Crisp session cleanly
    window.location.reload();
  });

  // ── Email form submit ─────────────────────────────────────────────────────
  emailForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var email = emailInput.value.trim();
    var name  = nameInput.value.trim();
    if (!email) return;

    gateBtn.disabled    = true;
    gateBtn.textContent = "Connecting…";

    localStorage.setItem("crisp_user_email", email);
    localStorage.setItem("crisp_user_name",  name);

    currentEmail = email;
    currentName  = name;

    showMainUI(email, name);
  });

  // ── Auto-login if email already saved ────────────────────────────────────
  if (currentEmail) {
    showMainUI(currentEmail, currentName);
  }

})();
</script>

</body>
</html>
