<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrispChat — Customer Support</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://client.crisp.chat" crossorigin />

  <style>
    :root{
      --bg0:#060a12;
      --bg1:#0b1220;
      --bg2:#0f1b33;
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.52);
      --line:rgba(255,255,255,0.09);
      --accent0:#7c3aed;
      --accent1:#22d3ee;
      --header-h:62px;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}

    body{
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 600px at 15% 0%,rgba(124,58,237,0.25),transparent 55%),
        radial-gradient(700px 500px at 88% 20%,rgba(34,211,238,0.15),transparent 60%),
        linear-gradient(180deg,var(--bg0),var(--bg1) 50%,var(--bg2));
    }

    .app{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
    }

	    header{
	      min-height:var(--header-h);
	      flex-shrink:0;
	      display:flex;
	      align-items:center;
	      justify-content:space-between;
	      padding:0 20px;
	      gap:12px;
	      flex-wrap:wrap;
	      border-bottom:1px solid var(--line);
	      background:rgba(6,10,18,0.7);
	      backdrop-filter:blur(16px);
	      z-index:20;
	    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      user-select:none;
    }

    .brand img{width:30px;height:30px}
    .brand .name{font-size:15px;font-weight:700}
    .brand .tag{
      padding:3px 10px;
      border:1px solid rgba(255,255,255,0.13);
      border-radius:999px;
      font-size:11px;
      color:var(--muted);
      background:rgba(255,255,255,0.06);
    }

	    .header-right{
	      display:flex;
	      align-items:center;
	      gap:10px;
	      flex-wrap:wrap;
	      justify-content:flex-end;
	    }

    .header-btn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.82);
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:650;
      cursor:pointer;
      transition:transform 120ms ease, border-color 120ms ease, background 120ms ease;
      line-height:1;
    }

    .header-btn:hover{
      background:rgba(255,255,255,0.09);
      border-color:rgba(255,255,255,0.2);
      transform:translateY(-1px);
    }

	    .header-btn:active{transform:translateY(0)}

	    .header-actions{
	      display:flex;
	      align-items:center;
	      gap:8px;
	      flex-wrap:wrap;
	    }

	    .icon-btn{
	      width:34px;
	      height:34px;
	      display:inline-flex;
	      align-items:center;
	      justify-content:center;
	      border-radius:999px;
	      border:1px solid rgba(255,255,255,0.14);
	      background:rgba(255,255,255,0.06);
	      color:rgba(255,255,255,0.82);
	      transition:transform 120ms ease, border-color 120ms ease, background 120ms ease;
	      flex:0 0 auto;
	    }

	    .icon-btn:hover{
	      background:rgba(255,255,255,0.09);
	      border-color:rgba(255,255,255,0.2);
	      transform:translateY(-1px);
	    }

	    .icon-btn:active{transform:translateY(0)}
	    .icon-btn svg{display:block}

    .online-badge{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:var(--muted);
    }

    .online-dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#22c55e;
      box-shadow:0 0 6px rgba(34,197,94,0.7);
      animation:pulse 2s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.45}
    }

    .user-pill{
      display:none;
      align-items:center;
      gap:7px;
      padding:5px 12px;
      border:1px solid rgba(255,255,255,0.11);
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      background:rgba(255,255,255,0.06);
    }

    .user-pill.visible{display:flex}

    .user-pill button{
      background:none;
      border:none;
      cursor:pointer;
      color:rgba(255,255,255,0.28);
      font-size:14px;
      padding:0 0 0 3px;
      transition:color 150ms;
      line-height:1;
    }

    .user-pill button:hover{color:rgba(255,255,255,0.7)}

    main{
      flex:1;
      position:relative;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    #email-gate{
      display:none;
      position:absolute;
      inset:0;
      z-index:30;
      background:rgba(6,10,18,0.92);
      backdrop-filter:blur(14px);
      align-items:center;
      justify-content:center;
    }

    #email-gate.show{display:flex}

    .gate-card{
      width:min(420px,92vw);
      background:rgba(11,18,32,0.97);
      border:1px solid rgba(255,255,255,0.11);
      border-radius:22px;
      padding:38px 32px;
      box-shadow:0 28px 90px rgba(0,0,0,0.7);
    }

    .gate-icon{
      width:48px;
      height:48px;
      border-radius:14px;
      margin-bottom:18px;
      background:linear-gradient(135deg,var(--accent0),var(--accent1));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
    }

    .gate-card h2{
      font-size:21px;
      font-weight:700;
      margin-bottom:6px;
    }

    .gate-card p{
      font-size:13px;
      color:var(--muted);
      margin-bottom:28px;
      line-height:1.55;
    }

    .field-label{
      display:block;
      font-size:11px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.6px;
      color:rgba(255,255,255,0.35);
      margin-bottom:7px;
    }

    .field-input{
      width:100%;
      padding:11px 15px;
      margin-bottom:15px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:12px;
      color:#fff;
      font-size:14px;
      outline:none;
      transition:border-color 160ms;
    }

    .field-input:focus{border-color:rgba(124,58,237,0.8)}
    .field-input::placeholder{color:rgba(255,255,255,0.2)}

    .btn-primary{
      width:100%;
      padding:13px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent0),var(--accent1));
      color:#fff;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:opacity 160ms;
      margin-top:4px;
    }

    .btn-primary:hover{opacity:.85}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}

    #chat-ui{
      display:none;
      flex:1;
      flex-direction:column;
      overflow:hidden;
    }

    #chat-ui.show{display:flex}

    #messages{
      flex:1;
      overflow-y:auto;
      padding:20px 16px;
      display:flex;
      flex-direction:column;
      gap:4px;
      scrollbar-width:thin;
      scrollbar-color:rgba(255,255,255,0.08) transparent;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:11px;
      color:rgba(255,255,255,0.28);
      margin:12px 0 8px;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:rgba(255,255,255,0.07);
    }

    .msg-row{
      display:flex;
      flex-direction:column;
      max-width:72%;
    }

    .msg-row.customer{
      align-self:flex-end;
      align-items:flex-end;
    }

    .msg-row.operator{
      align-self:flex-start;
      align-items:flex-start;
    }

    .msg-sender{
      font-size:11px;
      color:var(--muted);
      margin-bottom:3px;
      padding:0 4px;
    }

    .msg-bubble{
      padding:10px 15px;
      border-radius:18px;
      font-size:14px;
      line-height:1.45;
      word-break:break-word;
      max-width:100%;
    }

    .msg-row.customer .msg-bubble{
      background:linear-gradient(135deg,#6d28d9,#5b5ef4);
      color:#fff;
      border-bottom-right-radius:5px;
    }

    .msg-row.operator .msg-bubble{
      background:rgba(255,255,255,0.11);
      color:var(--text);
      border-bottom-left-radius:5px;
    }

    .msg-time{
      font-size:10px;
      color:rgba(255,255,255,0.22);
      margin-top:4px;
      padding:0 4px;
    }

    #typing-row{
      display:none;
      align-self:flex-start;
      align-items:flex-end;
      gap:8px;
      margin-top:4px;
    }

    #typing-row.show{display:flex}

    .typing-bubble{
      padding:10px 16px;
      border-radius:18px;
      border-bottom-left-radius:5px;
      background:rgba(255,255,255,0.1);
      display:flex;
      align-items:center;
      gap:4px;
    }

    .typing-bubble span{
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(255,255,255,0.45);
      animation:bounce 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2){animation-delay:.15s}
    .typing-bubble span:nth-child(3){animation-delay:.30s}

    @keyframes bounce{
      0%,80%,100%{transform:translateY(0)}
      40%{transform:translateY(-5px)}
    }

    .chat-empty{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,0.22);
      text-align:center;
      gap:10px;
      padding:32px;
    }

    .chat-empty .empty-icon{
      font-size:36px;
      opacity:.4;
    }

    .chat-empty p{
      font-size:13px;
      line-height:1.6;
    }

    #input-bar{
      flex-shrink:0;
      height:70px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 16px;
      border-top:1px solid var(--line);
      background:rgba(6,10,18,0.6);
      backdrop-filter:blur(12px);
    }

    #msg-input{
      flex:1;
      padding:11px 16px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:999px;
      color:#fff;
      font-size:14px;
      outline:none;
      resize:none;
      max-height:110px;
      line-height:1.4;
      transition:border-color 160ms;
      font-family:inherit;
    }

    #msg-input:focus{border-color:rgba(124,58,237,0.7)}
    #msg-input::placeholder{color:rgba(255,255,255,0.25)}

    #send-btn{
      width:42px;
      height:42px;
      flex-shrink:0;
      border:none;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent0),var(--accent1));
      color:#fff;
      font-size:17px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity 160ms,transform 100ms;
    }

    #send-btn:hover{opacity:.85}
    #send-btn:active{transform:scale(.92)}
    #send-btn:disabled{opacity:.35;cursor:not-allowed}

    .powered{
      text-align:center;
      font-size:10px;
      color:rgba(255,255,255,0.18);
      padding:5px 0 6px;
      flex-shrink:0;
    }

    /* Hide EVERYTHING Crisp renders on screen */
.crisp-client,
.crisp-client .cc-1brb6,
.crisp-client .cc-kv6t,
#crisp-chatbox {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

	    @media(max-width:480px){
	      header{padding:12px 12px}
	      .brand .tag,.online-badge{display:none}
	      .header-right{gap:8px}
	      .msg-row{max-width:88%}
	      #messages{padding:14px 10px}
	      #input-bar{padding:0 10px}
	    }

	    @media(max-width:360px){
	      .brand .name{font-size:13px}
	      .header-btn{padding:7px 10px}
	      .icon-btn{width:32px;height:32px}
	    }

    @media(prefers-reduced-motion:reduce){
      .online-dot,.typing-bubble span{animation:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="/logo.svg" alt="CrispChat" width="30" height="30" />
        <div class="name">CrispChat</div>
        <div class="tag">Support</div>
      </div>

	      <div class="header-right">
	        <div class="online-badge">
	          <div class="online-dot"></div>
	          <span>Online</span>
	        </div>

	        <div class="header-actions">
	          <a class="icon-btn" href="https://wa.me/+918879201044" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp" title="WhatsApp">
	            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
	              <path d="M20.52 3.48A11.91 11.91 0 0 0 12.06 0C5.49 0 .17 5.32.17 11.88c0 2.1.55 4.14 1.6 5.95L0 24l6.33-1.66a11.85 11.85 0 0 0 5.7 1.46h.01c6.56 0 11.89-5.33 11.89-11.89 0-3.18-1.24-6.16-3.41-8.43Zm-8.46 18.3h-.01a9.86 9.86 0 0 1-5.03-1.38l-.36-.21-3.75.98 1-3.66-.24-.38a9.84 9.84 0 0 1-1.5-5.25c0-5.45 4.44-9.88 9.9-9.88a9.83 9.83 0 0 1 6.98 2.9 9.82 9.82 0 0 1 2.9 6.98c0 5.46-4.43 9.9-9.89 9.9Zm5.42-7.39c-.3-.15-1.77-.88-2.04-.98-.28-.1-.48-.15-.68.15-.2.3-.78.98-.96 1.18-.18.2-.35.22-.65.07-.3-.15-1.27-.47-2.42-1.49-.89-.79-1.5-1.77-1.68-2.06-.18-.3-.02-.46.13-.61.13-.13.3-.35.45-.53.15-.18.2-.3.3-.5.1-.2.05-.38-.02-.53-.07-.15-.68-1.64-.93-2.25-.24-.58-.49-.5-.68-.5h-.58c-.2 0-.53.07-.8.38-.28.3-1.05 1.03-1.05 2.5 0 1.47 1.08 2.89 1.23 3.1.15.2 2.13 3.25 5.16 4.56.72.31 1.28.5 1.72.64.72.23 1.38.2 1.9.12.58-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.08-.12-.27-.2-.57-.35Z"/>
	            </svg>
	          </a>

	          <a class="icon-btn" href="tel:+12095937171" aria-label="Call support" title="Call">
	            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
	              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.12.86.3 1.7.54 2.5a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.58-1.06a2 2 0 0 1 2.11-.45c.8.24 1.64.42 2.5.54A2 2 0 0 1 22 16.92Z"/>
	            </svg>
	          </a>
	        </div>
	
	        <button id="login-btn" class="header-btn" type="button">Login</button>

        <div id="user-pill" class="user-pill">
          <span id="user-pill-email"></span>
          <button id="logout-btn" title="Switch account">✕</button>
        </div>
      </div>
    </header>

    <main>
      <div id="email-gate" role="dialog" aria-modal="true" aria-labelledby="gate-title">
        <div class="gate-card">
          <div class="gate-icon">💬</div>
          <h2 id="gate-title">Login (optional)</h2>
          <p>Add your name/email to load chat history across devices. You can also continue without entering anything.</p>

          <form id="email-form" novalidate>
            <label class="field-label" for="name-input">Your name (optional)</label>
            <input id="name-input" class="field-input" type="text" placeholder="e.g. Thaqib" autocomplete="name" />

            <label class="field-label" for="email-input">Email address (optional)</label>
            <input id="email-input" class="field-input" type="email" placeholder="you@example.com" autocomplete="email" />

            <button type="submit" class="btn-primary" id="gate-btn">Continue →</button>
          </form>
        </div>
      </div>

      <div id="chat-ui">
        <div id="messages" role="log" aria-live="polite"></div>

        <div id="typing-row">
          <div class="typing-bubble">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </main>

    <div id="input-bar" style="display:none;">
      <textarea id="msg-input" rows="1" placeholder="Type a message…" aria-label="Message input"></textarea>

      <button id="send-btn" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="powered" id="powered-bar" style="display:none;">Powered by Crisp</div>
  </div>

  <script>
    (function () {
      "use strict";
  
      var CRISP_ID = "68987257-808e-403d-a06c-35b3ec18c3ef";
  
      var currentEmail = localStorage.getItem("crisp_user_email") || "";
      var currentName  = localStorage.getItem("crisp_user_name")  || "";
  
      var emailGate     = document.getElementById("email-gate");
      var emailForm     = document.getElementById("email-form");
      var emailInput    = document.getElementById("email-input");
      var nameInput     = document.getElementById("name-input");
      var gateBtn       = document.getElementById("gate-btn");
      var chatUI        = document.getElementById("chat-ui");
      var messagesEl    = document.getElementById("messages");
      var typingRow     = document.getElementById("typing-row");
      var inputBar      = document.getElementById("input-bar");
	      var poweredBar    = document.getElementById("powered-bar");
	      var msgInput      = document.getElementById("msg-input");
	      var sendBtn       = document.getElementById("send-btn");
	      var loginBtn      = document.getElementById("login-btn");
	      var userPill      = document.getElementById("user-pill");
	      var userPillEmail = document.getElementById("user-pill-email");
	      var logoutBtn     = document.getElementById("logout-btn");
	      var typingTimer   = null;

	      function isGuestEmail(email) {
	        return typeof email === "string" && email.indexOf("guest+") === 0 && email.indexOf("@crispchat.local") > -1;
	      }

	      function createGuestEmail() {
	        var uuid = "";
	        try {
	          uuid = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : "";
	        } catch (_) {}
	        if (!uuid) {
	          uuid = String(Date.now()) + "-" + String(Math.random()).slice(2);
	        }
	        return "guest+" + uuid + "@crispchat.local";
	      }

	      function ensureIdentity() {
	        var storedEmail = localStorage.getItem("crisp_user_email") || "";
	        if (!storedEmail) {
	          storedEmail = createGuestEmail();
	          localStorage.setItem("crisp_user_email", storedEmail);
	        }
	        currentEmail = storedEmail;
	        currentName  = localStorage.getItem("crisp_user_name") || "";
	      }

	      function updateHeaderIdentity(email) {
	        if (isGuestEmail(email)) {
	          userPill.classList.remove("visible");
	          loginBtn.textContent = "Login";
	        } else {
	          userPillEmail.textContent = email;
	          userPill.classList.add("visible");
	          loginBtn.textContent = "Switch";
	        }
	      }
  
      // ── Notification helper ───────────────────────────────────────────────
      function sendNotification(title, body) {
        if (!("Notification" in window)) return;
        if (Notification.permission !== "granted") return;
  
        var notif = new Notification(title, {
          body:      body.length > 80 ? body.substring(0, 80) + "…" : body,
          icon:      "/logo.svg",
          badge:     "/logo.svg",
          tag:       "crisp-support",
          renotify:  true
        });
  
        notif.onclick = function () {
          window.focus();
          notif.close();
        };
  
        setTimeout(function () { notif.close(); }, 6000);
      }
  
      function requestNotificationPermission() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      }
  
      // ── Time formatter ────────────────────────────────────────────────────
      function formatTime(iso) {
        var d = new Date(iso);
        return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " +
               d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }
  
      // ── Scroll to bottom ──────────────────────────────────────────────────
      function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
  
      // ── Add a divider line ────────────────────────────────────────────────
      function addDivider(label) {
        var d = document.createElement("div");
        d.className = "divider";
        d.textContent = label;
        messagesEl.insertBefore(d, typingRow);
      }
  
      // ── Add a message bubble ──────────────────────────────────────────────
      function addBubble(message, sender, timeLabel, showSender) {
        var empty = messagesEl.querySelector(".chat-empty");
        if (empty) empty.remove();
  
        var row = document.createElement("div");
        row.className = "msg-row " + (sender === "operator" ? "operator" : "customer");
  
        if (showSender && sender === "operator") {
          var senderEl = document.createElement("div");
          senderEl.className = "msg-sender";
          senderEl.textContent = "Support";
          row.appendChild(senderEl);
        }
  
        var bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.textContent = message;
        row.appendChild(bubble);
  
        if (timeLabel) {
          var time = document.createElement("div");
          time.className = "msg-time";
          time.textContent = timeLabel;
          row.appendChild(time);
        }
  
        messagesEl.insertBefore(row, typingRow);
        scrollBottom();
      }
  
      // ── Typing indicator ──────────────────────────────────────────────────
      function showTyping() {
        typingRow.classList.add("show");
        scrollBottom();
      }
  
      function hideTyping() {
        typingRow.classList.remove("show");
      }
  
      // ── Save message to PostgreSQL ─────────────────────────────────────────
      function saveMessage(email, message, sender) {
        fetch("/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, message: message, sender: sender })
        }).catch(function (e) {
          console.warn("save failed:", e);
        });
      }
  
      // ── Load history from PostgreSQL ───────────────────────────────────────
      function loadHistory(email, cb) {
        fetch("/messages?email=" + encodeURIComponent(email))
          .then(function (r) { return r.json(); })
          .then(function (rows) {
            messagesEl.innerHTML = "";
  
            if (!Array.isArray(rows) || rows.length === 0) {
              messagesEl.innerHTML =
                '<div class="chat-empty">' +
                  '<div class="empty-icon">💬</div>' +
                  '<p>No previous conversations.<br>Send a message to get started!</p>' +
                '</div>';
              messagesEl.appendChild(typingRow);
              if (cb) cb();
              return;
            }
  
            messagesEl.appendChild(typingRow);
            addDivider("Previous conversation");
  
            rows.forEach(function (m) {
              addBubble(m.message, m.sender, formatTime(m.created_at), true);
            });
  
            addDivider("Live chat");
            if (cb) cb();
          })
          .catch(function () {
            messagesEl.innerHTML = '<div class="chat-empty"><p>Could not load history.</p></div>';
            messagesEl.appendChild(typingRow);
            if (cb) cb();
          });
      }
  
      // ── Send a message ─────────────────────────────────────────────────────
      function sendMessage() {
        var text = msgInput.value.trim();
        if (!text) return;
  
        msgInput.value = "";
        msgInput.style.height = "";
        sendBtn.disabled = true;
  
        addBubble(text, "customer", "Just now", false);
        saveMessage(currentEmail, text, "customer");
  
        if (window.$crisp) {
          window.$crisp.push(["do", "message:send", ["text", text]]);
        }
  
        setTimeout(function () { sendBtn.disabled = false; }, 400);
      }
  
      // ── Init Crisp (hidden engine) ─────────────────────────────────────────
      function initCrisp(email, name) {
        window.$crisp = [];
        window.CRISP_WEBSITE_ID = CRISP_ID;

        // Avoid throwing on invalid user values
        window.$crisp.push(["safe", true]);

        window.$crisp.push(["set", "user:email",    [email]]);
        window.$crisp.push(["set", "user:nickname", [name || (isGuestEmail(email) ? "Guest" : email.split("@")[0])]]);
  
        // Hide Crisp's own widget — we use our custom UI
        window.$crisp.push(["do", "chat:hide"]);
  
        // Incoming operator message
        window.$crisp.push(["on", "message:received", function (data) {
          if (!data || !data.content) return;
          hideTyping();
          addBubble(data.content, "operator", "Just now", true);
          saveMessage(email, data.content, "operator");
  
          // Notify customer if tab is not focused
          if (document.hidden || !document.hasFocus()) {
            sendNotification("Support replied 💬", data.content);
          }
        }]);
  
        // Operator is typing
        window.$crisp.push(["on", "message:composing:operator", function (data) {
          if (data && data.composing) {
            showTyping();
            clearTimeout(typingTimer);
            typingTimer = setTimeout(hideTyping, 5000);
          } else {
            hideTyping();
          }
        }]);
  
        var s = document.createElement("script");
        s.src   = "https://client.crisp.chat/l.js";
        s.async = 1;
        document.head.appendChild(s);
      }
  
      // ── Show main chat UI ──────────────────────────────────────────────────
      function showChat(email, name) {
        // Ask for notification permission as soon as user logs in
        requestNotificationPermission();
  
        emailGate.classList.remove("show");
        chatUI.classList.add("show");
        inputBar.style.display  = "flex";
        poweredBar.style.display = "block";
        updateHeaderIdentity(email);
  
        loadHistory(email, function () {
          initCrisp(email, name);
        });
      }
  
      // ── Auto-resize textarea ───────────────────────────────────────────────
      msgInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 110) + "px";
      });
  
      // Send on Enter, new line on Shift+Enter
      msgInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
  
      sendBtn.addEventListener("click", sendMessage);
  
      // ── Logout ─────────────────────────────────────────────────────────────
      logoutBtn.addEventListener("click", function () {
        localStorage.removeItem("crisp_user_email");
        localStorage.removeItem("crisp_user_name");
        window.location.reload();
      });

      // â”€â”€ Login button: open optional gate â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      loginBtn.addEventListener("click", function () {
        // If currently a real user, prefill for quick edits
        if (currentEmail && !isGuestEmail(currentEmail)) {
          emailInput.value = currentEmail;
        } else {
          emailInput.value = "";
        }
        nameInput.value = currentName || "";

        gateBtn.disabled = false;
        gateBtn.textContent = "Continue →";
        emailGate.classList.add("show");
        setTimeout(function () { nameInput.focus(); }, 0);
      });

      // Close gate on backdrop click / Escape
      emailGate.addEventListener("click", function (e) {
        if (e.target === emailGate) emailGate.classList.remove("show");
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") emailGate.classList.remove("show");
      });
  
      // ── Gate form submit ───────────────────────────────────────────────────
      emailForm.addEventListener("submit", function (e) {
        e.preventDefault();
  
        var email = emailInput.value.trim();
        var name  = nameInput.value.trim();

        // If email is provided, it should look like an email (basic check)
        if (email && email.indexOf("@") === -1) {
          emailInput.focus();
          return;
        }
  
        gateBtn.disabled    = true;
        gateBtn.textContent = "Connecting…";
  
        // No email entered: keep current (guest) identity, just save the name if any
        if (!email) {
          localStorage.setItem("crisp_user_name", name);
          currentName = name;
          if (window.$crisp && name) {
            window.$crisp.push(["set", "user:nickname", [name]]);
          }
          emailGate.classList.remove("show");
          gateBtn.disabled = false;
          gateBtn.textContent = "Continue →";
          updateHeaderIdentity(currentEmail);
          return;
        }

        localStorage.setItem("crisp_user_email", email);
        localStorage.setItem("crisp_user_name",  name);
  
        currentEmail = email;
        currentName  = name;
  
        // Switching identity is simplest via reload (avoids double Crisp bootstraps)
        window.location.reload();
      });
  
      // ── Auto-login if email already saved ──────────────────────────────────
      ensureIdentity();
      showChat(currentEmail, currentName);
  
    })();
  </script>
</body>
</html>
